spring:
  application:
    name: easychat-login-service
    version: 0.0.1
    description: EasyChat Login Service

  datasource:
    url: jdbc:mysql://localhost:3307/easy_chat?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver


mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.eastchat.easychatloginservice.entity
  configuration:
    map-underscore-to-camel-case: true
